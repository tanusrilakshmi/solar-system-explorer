<!DOCTYPE html>
<html lang="en">
<head>
  <title>Solar Explorer - Games</title>
  <style>
    body {
      font-family: 'Segoe UI', sans-serif;
      background: url('https://images.unsplash.com/photo-1446776811953-b23d57bd21aa?ixlib=rb-4.0.3&auto=format&fit=crop&w=1350&q=80') center/cover no-repeat;
      color: white;
      overflow-x: hidden;

      margin: 0;
    }

    .stars {
      background: transparent url('https://www.transparenttextures.com/patterns/stardust.png') repeat;
      position: fixed;
      width: 100%;
      height: 100%;
      animation: moveStars 150s linear infinite;
      z-index: 0;
    }

    @keyframes moveStars {
      from { background-position: 0 0; }
      to { background-position: 1000px 1000px; }
    }

    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 20px 60px;
      background: rgba(0, 0, 0, 0.6);
      position: sticky;
      top: 0;
      z-index: 10;
    }

    .logo {
      font-size: 28px;
      font-weight: bold;
      color: orange;
    }

    nav a {
      color: #fff;
      margin: 0 15px;
      text-decoration: none;
    }

    nav a:hover {
      color: orange;
    }

    .game-container {
      text-align: center;
      padding: 100px 20px;
      z-index: 1;
      position: relative;
    }

    .game-container h1 {
      font-size: 48px;
      color: #ffa500;
      margin-bottom: 20px;
    }

    .game-box {
      background-color: rgba(255, 255, 255, 0.08);
      padding: 40px;
      border-radius: 16px;
      max-width: 600px;
      margin: auto;
    }

    .start-btn {
      padding: 12px 24px;
      border: 2px solid orange;
      background-color: transparent;
      color: orange;
      font-size: 16px;
      border-radius: 25px;
      cursor: pointer;
      transition: 0.3s ease;
    }

    .start-btn:hover {
      background-color: orange;
      color: black;
      transform: scale(1.05);
    }

    .timer {
      font-size: 20px;
      color: #ffcc00;
      margin-bottom: 20px;
    }

    .fade {
      animation: fadeIn 0.5s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    footer {
      background: rgba(0, 0, 0, 0.6);
      text-align: center;
      padding: 20px;
      font-size: 14px;
    }
  </style>
</head>
<body>
  <div class="stars"></div>

  <header>
    <div class="logo">Solar Explorer</div>
    <nav>
      <a href="home3.html">Home</a>
      <a href="planet.html">Planets</a>
      <a href="quiz.html">Quiz</a>
      <a href="facts.html">Facts</a>
      <a href="faq.html">FAQ</a>
    </nav>
  </header>

  <section class="game-container">
    <h1>Solar System Quiz</h1>
    <div class="timer" id="timer">Time Left: 15s</div>

    <div class="game-box" id="quiz-box">
      <div id="question-container" class="fade">
        <p id="question" style="font-size: 20px;"></p>
        <div id="answers" style="margin-top: 20px;"></div>
      </div>

      <div id="result-container" style="display: none;">
        <p id="score-display"></p>
        <p id="highscore-display"></p>
        <button class="start-btn" onclick="startGame()">Play Again</button>
      </div>

      <button id="start-btn" class="start-btn" onclick="startGame()">Start Game</button>
    </div>
  </section>

  <footer>
    &copy; 2026 Solar System Explorer. All Rights Reserved.
  </footer>

  <!-- Audio Effects -->
  <audio id="correct-sound" src="https://assets.mixkit.co/sfx/preview/mixkit-correct-answer-tone-2870.mp3"></audio>
  <audio id="wrong-sound" src="https://assets.mixkit.co/sfx/preview/mixkit-wrong-answer-fail-notification-946.mp3"></audio>

  <script>
    const questions = [
      { question: "Which planet is closest to the Sun?", answers: ["Earth", "Mercury", "Venus", "Mars"], correct: "Mercury" },
      { question: "Which planet is known as the Red Planet?", answers: ["Mars", "Jupiter", "Saturn", "Neptune"], correct: "Mars" },
      { question: "Which is the largest planet?", answers: ["Saturn", "Jupiter", "Earth", "Uranus"], correct: "Jupiter" },
      { question: "Which planet has rings?", answers: ["Venus", "Saturn", "Mars", "Earth"], correct: "Saturn" },
      { question: "Which planet is tilted on its side?", answers: ["Uranus", "Venus", "Pluto", "Earth"], correct: "Uranus" }
    ];

    let currentIndex = 0, score = 0, timer = 15, interval;
    const questionEl = document.getElementById("question");
    const answersEl = document.getElementById("answers");
    const timerEl = document.getElementById("timer");
    const startBtn = document.getElementById("start-btn");
    const questionContainer = document.getElementById("question-container");
    const resultContainer = document.getElementById("result-container");
    const scoreDisplay = document.getElementById("score-display");
    const highscoreDisplay = document.getElementById("highscore-display");
    const correctSound = document.getElementById("correct-sound");
    const wrongSound = document.getElementById("wrong-sound");

    function startGame() {
      currentIndex = 0;
      score = 0;
      startBtn.style.display = "none";
      resultContainer.style.display = "none";
      questionContainer.style.display = "block";
      showQuestion();
    }

    function showQuestion() {
      if (interval) clearInterval(interval);
      timer = 15;
      updateTimer();
      interval = setInterval(() => {
        timer--;
        updateTimer();
        if (timer <= 0) {
          clearInterval(interval);
          checkAnswer(null); // timeout
        }
      }, 1000);

      const current = questions[currentIndex];
      questionEl.textContent = current.question;
      answersEl.innerHTML = "";
      questionContainer.classList.add("fade");

      current.answers.forEach(answer => {
        const btn = document.createElement("button");
        btn.textContent = answer;
        btn.className = "start-btn";
        btn.style.margin = "10px";
        btn.onclick = () => checkAnswer(answer);
        answersEl.appendChild(btn);
      });
    }

    function checkAnswer(answer) {
      clearInterval(interval);
      const correct = questions[currentIndex].correct;
      if (answer === correct) {
        correctSound.play();
        score++;
      } else {
        wrongSound.play();
      }

      currentIndex++;
      if (currentIndex < questions.length) {
        setTimeout(showQuestion, 1000);
      } else {
        endGame();
      }
    }

    function endGame() {
      questionContainer.style.display = "none";
      resultContainer.style.display = "block";
      scoreDisplay.textContent = `You scored ${score} out of ${questions.length}!`;

      const highScore = Math.max(score, Number(localStorage.getItem("solarHighScore") || 0));
      localStorage.setItem("solarHighScore", highScore);
      highscoreDisplay.textContent = `🌟 High Score: ${highScore}`;
    }

    function updateTimer() {
      timerEl.textContent = `Time Left: ${timer}s`;
    }
  </script>
</body>
</html>
